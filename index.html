<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>金豆PK — 魔法森林</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e74c3c; --blue:#3498db;
  --gold:#f0c040; --wood:#8b5e3c;
}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  overflow:hidden;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  background:#1a0a00;
}

/* ===== FOREST SCENE ===== */
.scene{
  position:fixed;inset:0;
  background:linear-gradient(180deg,
    #1a0a00 0%,#2d1810 6%,#4a2512 12%,#7a3e1a 20%,
    #c67a3a 35%,#e8b868 50%,#f5d78a 60%,
    #e8c060 70%,#c8a040 78%,#4a7a2a 82%,#2d5a1a 90%,#1a3a0a 100%);
  overflow:hidden;
}
.scene::before{
  content:'';position:absolute;inset:0;top:0;height:60%;
  background:linear-gradient(180deg,
    rgba(20,10,30,0.8) 0%,rgba(40,20,40,0.6) 20%,
    rgba(80,30,20,0.3) 40%,rgba(180,120,60,0.15) 60%,transparent 80%);
  pointer-events:none;z-index:0;
}
.scene::after{
  content:'';position:absolute;inset:0;top:5%;height:55%;
  background:
    radial-gradient(ellipse at 20% 15%,rgba(255,220,150,0.15) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 10%,rgba(255,200,100,0.12) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 12%,rgba(255,220,140,0.1) 0%,transparent 45%);
  pointer-events:none;z-index:1;
}

/* ===== TREES ===== */
.trees{position:absolute;inset:0;pointer-events:none;z-index:2;}
.tree{
  position:absolute;bottom:0;width:0;height:0;
  border-left:30px solid transparent;border-right:30px solid transparent;
  border-bottom:120px solid #1a3a0a;
  filter:brightness(0.7);
  animation:treeSway var(--sw,6s) ease-in-out infinite;
  animation-delay:var(--swd,0s);
  transform-origin:bottom center;
}
.tree.t1{left:2%;bottom:15%;border-bottom-color:#1a3a0a;border-bottom-width:160px;border-left-width:40px;border-right-width:40px;--sw:5s;}
.tree.t2{left:8%;bottom:12%;border-bottom-color:#1d4010;border-bottom-width:140px;border-left-width:35px;border-right-width:35px;--sw:7s;--swd:1.5s;}
.tree.t3{left:15%;bottom:14%;border-bottom-color:#1a3508;border-bottom-width:180px;border-left-width:45px;border-right-width:45px;--sw:6s;--swd:3s;}
.tree.t4{left:78%;bottom:13%;border-bottom-color:#1c3d0c;border-bottom-width:170px;border-left-width:42px;border-right-width:42px;--sw:5.5s;--swd:0.8s;}
.tree.t5{left:85%;bottom:11%;border-bottom-color:#1a3a0a;border-bottom-width:150px;border-left-width:38px;border-right-width:38px;--sw:7.5s;--swd:2s;}
.tree.t6{left:93%;bottom:16%;border-bottom-color:#1d4010;border-bottom-width:155px;border-left-width:36px;border-right-width:36px;--sw:6.2s;--swd:4s;}
.tree::after{
  content:'';position:absolute;left:50%;bottom:-120px;transform:translateX(-50%);
  width:16px;height:50px;background:linear-gradient(90deg,#3d1f0a,#5d3a1a,#3d1f0a);
  border-radius:4px 4px 0 0;
}
.tree.fore{filter:brightness(0.4);z-index:20;}
.tree.fore::after{bottom:-160px;height:70px;width:22px;}
.tree.f1{left:-3%;bottom:8%;border-bottom-color:#0f2505;border-bottom-width:220px;border-left-width:55px;border-right-width:55px;}
.tree.f2{left:90%;bottom:6%;border-bottom-color:#0f2505;border-bottom-width:240px;border-left-width:60px;border-right-width:60px;}

/* ===== CLEARING ===== */
.clearing{
  position:absolute;bottom:0;left:0;right:0;height:38%;
  background:linear-gradient(180deg,
    rgba(90,140,50,0.3) 0%,rgba(70,120,40,0.5) 20%,
    rgba(50,100,30,0.7) 50%,rgba(30,70,20,0.9) 100%);
  z-index:3;pointer-events:none;
  border-radius:60% 70% 0 0/40% 40% 0 0;
}
.clearing::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 70%,rgba(100,160,60,0.5) 0%,transparent 60%);
  border-radius:50% 50% 0 0/40% 40% 0 0;
}

/* Dappled light */
.dapple{
  position:absolute;top:12%;left:0;right:0;height:55%;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(255,220,140,0.12) 0%,transparent 30%),
    radial-gradient(ellipse at 45% 30%,rgba(255,200,100,0.1) 0%,transparent 25%),
    radial-gradient(ellipse at 75% 45%,rgba(255,220,130,0.08) 0%,transparent 28%),
    radial-gradient(ellipse at 30% 55%,rgba(255,210,120,0.09) 0%,transparent 22%),
    radial-gradient(ellipse at 60% 50%,rgba(255,200,110,0.11) 0%,transparent 26%);
  background-size:120% 120%,110% 110%,115% 115%,125% 125%,110% 110%;
  pointer-events:none;z-index:4;
  animation:dappleShift 8s ease-in-out infinite;
}

/* ===== BATTLEGROUND ===== */
.battleground{
  position:absolute;bottom:6%;left:0;right:0;height:50%;
  display:flex;align-items:flex-end;justify-content:center;
  z-index:5;
}
.team-zone{
  flex:1;max-width:42%;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;
}
.team-label{
  font-size:22px;font-weight:900;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
  margin-bottom:8px;letter-spacing:0.08em;
  display:flex;align-items:center;gap:8px;
}
.team-label .crown{
  font-size:28px;
  animation:crownBounce 0.6s ease-in-out infinite;
  display:none;
}
.team-label .crown.show{display:inline-block;}
@keyframes crownBounce{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-6px) scale(1.15);}
}
.team-a .team-label{color:#ff6b6b;}
.team-b .team-label{color:#74b9ff;}

.team-players{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-bottom:6px;
}
.team-total{
  font-size:16px;font-weight:900;color:#ffd700;
  text-shadow:0 0 12px rgba(255,215,0,0.5);
  background:rgba(0,0,0,0.4);padding:4px 16px;border-radius:12px;
  margin-top:4px;
}

/* ===== PK DIVIDER ===== */
.pk-divider{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  width:50px;flex-shrink:0;pointer-events:none;
  margin-bottom:20px;
}
.pk-line{
  width:3px;flex:1;min-height:60px;
  background:linear-gradient(180deg,
    rgba(255,215,0,0.1) 0%,rgba(255,215,0,0.6) 40%,
    rgba(255,215,0,0.8) 50%,rgba(255,215,0,0.6) 60%,
    rgba(255,215,0,0.1) 100%);
  animation:pkGlow 2s ease-in-out infinite;
}
@keyframes pkGlow{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.3);}
  50%{box-shadow:0 0 20px rgba(255,215,0,0.6);}
}
.pk-badge{
  font-size:20px;font-weight:900;color:#ffd700;
  text-shadow:0 0 15px rgba(255,215,0,0.7),0 0 30px rgba(255,180,0,0.4);
  background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;
  letter-spacing:0.1em;
  animation:pkPulse 1.5s ease-in-out infinite;
}
@keyframes pkPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

/* ===== STUMP + JAR + AVATAR ===== */
.stump-group{
  display:flex;flex-direction:column;align-items:center;
  pointer-events:auto;cursor:pointer;
  transition:transform 0.15s;
}
.stump-group:active{transform:scale(0.95);}
.stump{
  width:62px;height:22px;
  background:linear-gradient(180deg,#a0724a 0%,#6b3a1f 100%);
  border-radius:31px/11px;
  box-shadow:0 3px 8px rgba(0,0,0,0.3),inset 0 1px 3px rgba(255,255,255,0.1);
  position:relative;z-index:6;
}
.stump::before{
  content:'';position:absolute;top:3px;left:6px;right:6px;height:5px;
  background:radial-gradient(ellipse,#c09460 0%,transparent 70%);border-radius:50%;
}
.stump::after{
  content:'';position:absolute;bottom:-3px;left:10%;right:10%;height:5px;
  background:radial-gradient(ellipse at center,rgba(90,160,60,0.6),transparent);
  border-radius:50%;
}

.jar-wrapper{position:relative;margin-bottom:-5px;z-index:7;}
.jar{
  width:60px;height:85px;
  background:linear-gradient(180deg,
    rgba(255,255,255,0.18) 0%,rgba(200,220,240,0.1) 25%,
    rgba(180,200,220,0.08) 50%,rgba(150,180,200,0.12) 100%);
  border:2.5px solid rgba(180,200,210,0.45);
  border-radius:16px 16px 24px 24px;
  position:relative;overflow:hidden;
  box-shadow:
    inset 0 0 30px rgba(200,220,255,0.12),
    inset 0 -8px 15px rgba(100,150,100,0.1),
    0 8px 20px rgba(0,0,0,0.25);
  animation:jarGlow 4s ease-in-out infinite;
}
.jar::before{
  content:'';position:absolute;top:4px;left:6px;right:50%;height:2px;
  background:rgba(255,255,255,0.25);border-radius:2px;
}
.jar::after{
  content:'';position:absolute;top:8px;left:4px;width:6px;height:30px;
  background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent);border-radius:3px;
}
.jar-top{
  position:absolute;top:-6px;left:8px;right:8px;height:10px;
  background:linear-gradient(180deg,rgba(200,180,150,0.5),rgba(160,140,110,0.3));
  border-radius:6px 6px 2px 2px;
  border:2px solid rgba(180,160,130,0.5);border-bottom:none;z-index:2;
}
.water{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,
    rgba(255,215,0,0.25) 0%,rgba(255,200,50,0.35) 30%,
    rgba(240,180,20,0.5) 60%,rgba(200,140,10,0.6) 100%);
  transition:height 0.5s cubic-bezier(0.34,1.56,0.64,1);
  border-radius:0 0 21px 21px;z-index:1;
  animation:waterShimmer 3s ease-in-out infinite;
}
.water::after{
  content:'';position:absolute;top:2px;left:10%;right:10%;height:2px;
  background:rgba(255,255,200,0.4);border-radius:2px;
  animation:waterShimmer 2.5s ease-in-out infinite 0.5s;
}
.gems-layer{
  position:absolute;bottom:0;left:0;right:0;z-index:3;pointer-events:none;
}

/* Gem */
.gem{
  position:absolute;width:11px;height:13px;
  background:linear-gradient(135deg,#ffe680 0%,#f0c040 40%,#d4a020 70%,#b8860b 100%);
  clip-path:polygon(50% 0%,85% 30%,100% 65%,70% 100%,30% 100%,0% 65%,15% 30%);
  box-shadow:0 0 5px rgba(255,200,50,0.5),inset 0 1px 1px rgba(255,255,255,0.4);
  animation:gemShimmer 2s ease-in-out infinite;
}
@keyframes gemShimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3) saturate(1.2)}}

/* Avatar */
.avatar-ring{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#5d3a1a,#8b5e3c);
  border:3px solid #d4a060;
  box-shadow:0 3px 10px rgba(0,0,0,0.3),0 0 15px rgba(200,150,50,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;margin-bottom:4px;
  transition:transform 0.2s,box-shadow 0.2s;
}
.stump-group:hover .avatar-ring{
  transform:scale(1.1);
  box-shadow:0 5px 18px rgba(0,0,0,0.35),0 0 25px rgba(255,200,50,0.3);
}
.avatar-ring.red{border-color:#e74c3c;box-shadow:0 3px 10px rgba(0,0,0,0.3),0 0 18px rgba(230,80,60,0.3);}
.avatar-ring.blue{border-color:#3498db;box-shadow:0 3px 10px rgba(0,0,0,0.3),0 0 18px rgba(50,150,220,0.3);}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

.name-tag{
  font-size:9px;font-weight:bold;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
  margin-bottom:3px;pointer-events:none;max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;
}
.score-tag{
  font-size:10px;font-weight:bold;color:#ffd700;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);
  margin-top:3px;pointer-events:none;
}

/* ===== FLYING GEM ===== */
.flying-gem{
  position:fixed;pointer-events:none;z-index:50;
  width:20px;height:22px;
  background:linear-gradient(135deg,#fff4b0 0%,#ffd700 30%,#e6b800 60%,#b8860b 100%);
  clip-path:polygon(50% 0%,85% 30%,100% 65%,70% 100%,30% 100%,0% 65%,15% 30%);
  box-shadow:0 0 12px rgba(255,215,0,0.7),0 0 25px rgba(255,200,0,0.3);
  filter:drop-shadow(0 3px 4px rgba(0,0,0,0.3));
}
.flying-gem.dropping{animation:gemDrop 0.55s cubic-bezier(0.22,0.61,0.36,1) forwards;}
@keyframes gemDrop{
  0%{transform:translateY(-50px) scale(1.3) rotate(0deg);opacity:1}
  30%{transform:translateY(-15px) scale(1.1) rotate(15deg);opacity:1}
  70%{transform:translateY(8px) scale(0.95) rotate(-8deg);opacity:0.9}
  100%{transform:translateY(0) scale(0.7) rotate(0deg);opacity:0}
}

/* Sparkle */
.sparkle{
  position:fixed;pointer-events:none;z-index:51;
  width:5px;height:5px;background:#ffd700;border-radius:50%;
  box-shadow:0 0 5px #ffd700,0 0 10px #ffa500;
}
.sparkle.burst{animation:sparkleBurst 0.6s ease-out forwards;}
@keyframes sparkleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}
}

/* ===== HEADER ===== */
.header{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:linear-gradient(180deg,rgba(20,10,0,0.9),rgba(30,15,5,0.75));
  z-index:100;display:flex;align-items:center;padding:0 10px;
  gap:8px;backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(180,140,80,0.3);
}
.header .title{font-size:14px;font-weight:bold;color:#f0c040;text-shadow:0 0 10px rgba(240,192,64,0.4);white-space:nowrap;}
.header .btn{
  padding:5px 12px;border-radius:14px;border:1px solid rgba(240,192,64,0.4);
  background:rgba(60,30,10,0.5);color:#f0c040;
  font-size:11px;font-weight:bold;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:inherit;
}
.header .btn:hover{background:rgba(240,192,64,0.2);border-color:#f0c040;}
.header .btn.danger{border-color:rgba(230,80,60,0.5);color:#f5b7b1;}
.header .btn.danger:hover{background:rgba(230,80,60,0.2);}
.header .hdr-pk{
  font-size:13px;font-weight:bold;margin-left:auto;display:flex;gap:12px;align-items:center;color:#ffd700;
}

/* ===== SETTINGS ===== */
.settings-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.settings-overlay.show{display:flex;}
.settings-panel{
  background:linear-gradient(180deg,#3d1f0a,#2a1508);
  border:2px solid rgba(200,150,80,0.5);border-radius:20px;padding:20px;
  width:90%;max-width:400px;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);color:#f0d090;
}
.settings-panel h3{text-align:center;font-size:1.2em;margin-bottom:12px;color:#ffd700;}
.settings-panel label{display:block;font-size:12px;margin-bottom:3px;color:#d0b070;}
.settings-panel input[type=range]{width:100%;margin-bottom:10px;accent-color:#f0c040;}
.settings-panel .btn-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.settings-panel button{
  padding:7px 18px;border-radius:14px;
  border:1px solid rgba(240,192,64,0.4);
  background:rgba(100,60,20,0.5);color:#f0c040;
  font-size:12px;cursor:pointer;font-weight:bold;font-family:inherit;
}
.settings-panel button:hover{background:rgba(240,192,64,0.2);}
.settings-panel .student-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.settings-panel .student-chip{
  display:flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:10px;background:rgba(100,60,20,0.4);
  font-size:11px;border:1px solid rgba(200,150,80,0.3);cursor:pointer;
}
.settings-panel .student-chip .chip-emoji{font-size:16px;}

/* ===== COMPACT BAR ===== */
.compact-bar{
  position:fixed;top:48px;left:0;right:0;height:48px;
  background:linear-gradient(180deg,rgba(30,15,5,0.9),rgba(40,20,8,0.85));
  z-index:99;display:flex;align-items:center;padding:0 8px;
  gap:5px;overflow-x:auto;backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(180,140,80,0.2);
  transition:transform 0.3s;
}
.compact-bar.hidden{transform:translateY(-110%);pointer-events:none;}
.compact-bar .compact-sep{
  width:1px;height:28px;background:rgba(255,215,0,0.3);flex-shrink:0;
}
.compact-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  border:2px solid #d4a060;
  background:linear-gradient(135deg,#5d3a1a,#8b5e3c);
  transition:transform 0.15s;
}
.compact-avatar:active{transform:scale(0.9);}
.compact-avatar.red{border-color:#e74c3c;}
.compact-avatar.blue{border-color:#3498db;}
.compact-score{font-size:10px;font-weight:bold;color:#ffd700;text-shadow:0 1px 3px rgba(0,0,0,0.5);flex-shrink:0;margin-left:1px;}
.compact-pk{
  font-size:11px;font-weight:900;color:#ffd700;margin:0 4px;flex-shrink:0;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:#ffd700;padding:5px 14px;
  border-radius:10px;font-size:12px;font-weight:bold;z-index:300;
  pointer-events:none;opacity:0;transition:opacity 0.3s;
}
.toast.show{opacity:1;}

/* ===== FIREFLIES & MAGIC ===== */
.firefly{
  position:fixed;pointer-events:none;z-index:4;
  width:3px;height:3px;background:#ffeaa7;border-radius:50%;
  box-shadow:0 0 5px #ffeaa7,0 0 10px #ffd700,0 0 16px #ffa500;
  animation:fireflyFloat var(--fd) ease-in-out infinite;
  animation-delay:var(--fdl);opacity:0;
}

/* ===== KEYFRAMES ===== */
@keyframes treeSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(0.5deg)}75%{transform:rotate(-0.4deg)}}
@keyframes dappleShift{0%,100%{background-position:0% 0%,100% 0%,50% 100%}50%{background-position:5% 3%,95% 2%,48% 98%}}
@keyframes waterShimmer{0%,100%{opacity:0.6}50%{opacity:0.85}}
@keyframes jarGlow{
  0%,100%{box-shadow:inset 0 0 30px rgba(200,220,255,0.12),inset 0 -8px 15px rgba(100,150,100,0.1),0 8px 20px rgba(0,0,0,0.25),0 0 12px rgba(255,200,50,0.06)}
  50%{box-shadow:inset 0 0 40px rgba(200,220,255,0.18),inset 0 -8px 15px rgba(100,150,100,0.1),0 8px 20px rgba(0,0,0,0.25),0 0 20px rgba(255,200,50,0.12)}
}
@keyframes fireflyFloat{
  0%,100%{opacity:0;transform:translate(0,0)}
  20%{opacity:0.8}50%{opacity:0.4;transform:translate(var(--fx),var(--fy))}80%{opacity:0.7}
}
@keyframes magicDust{
  0%{transform:translate(0,0) scale(0);opacity:0}
  20%{transform:translate(var(--dx),var(--dy)) scale(1);opacity:0.7}
  80%{transform:translate(calc(var(--dx)*2),calc(var(--dy)*2)) scale(0.8);opacity:0.3}
  100%{transform:translate(calc(var(--dx)*3),calc(var(--dy)*3)) scale(0);opacity:0}
}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<div class="header">
  <span class="title">🪙 金豆PK</span>
  <button class="btn" onclick="toggleCompact()" id="btnCompact">📋 隐藏栏</button>
  <button class="btn" onclick="openSettings()">⚙️ 设置</button>
  <button class="btn danger" onclick="resetAll()">🔄 清零</button>
  <div class="hdr-pk" id="hdrPK"></div>
</div>

<!-- Compact bar -->
<div class="compact-bar" id="compactBar"></div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <h3>⚙️ 游戏设置</h3>
    <label>学生人数：<strong id="countLabel">8</strong></label>
    <input type="range" min="2" max="12" value="8" id="countSlider" oninput="updateCountPreview()">
    <div class="student-list" id="studentChips"></div>
    <p style="font-size:10px;color:#a08060;margin-top:4px;">💡 点击动物换头像 · 点击名字编辑</p>
    <div class="btn-row">
      <button onclick="applySettings()">✅ 应用</button>
      <button onclick="closeSettings()">✖️ 取消</button>
    </div>
  </div>
</div>

<!-- Forest Scene -->
<div class="scene" id="scene">
  <div class="trees">
    <div class="tree t1"></div><div class="tree t2"></div><div class="tree t3"></div>
    <div class="tree t4"></div><div class="tree t5"></div><div class="tree t6"></div>
    <div class="tree fore f1"></div><div class="tree fore f2"></div>
  </div>
  <div class="clearing"></div>
  <div class="dapple"></div>
  <div class="battleground" id="battleground"></div>
  <div id="fireflies"></div>
  <div id="magicDust"></div>
</div>

<script>
// ===== DATA =====
const DEFAULT_ANIMALS = ['🐶','🐱','🐰','🐼','🐨','🐸','🦊','🐯','🐵','🐻','🐮','🦁'];
const DEFAULT_NAMES  = ['小狗','小猫','小兔','熊猫','考拉','小蛙','小狐','小虎','小猴','小熊','小牛','小狮'];

let students = [];
let scores = {};

// Load state
function loadState(){
  try{
    const raw = localStorage.getItem('goldpk_v2');
    if(raw){ const s = JSON.parse(raw); students = s.students||[]; scores = s.scores||{}; }
  }catch(e){}
  if(!students.length){
    students = [0,1,2,3,4,5,6,7].map(i=>({id:i,emoji:DEFAULT_ANIMALS[i],name:DEFAULT_NAMES[i]}));
    students.forEach(s=>{ if(!(s.id in scores)) scores[s.id]=0; });
  }
}
function saveState(){
  try{ localStorage.setItem('goldpk_v2', JSON.stringify({students,scores})); }catch(e){}
}

// ===== TEAM LOGIC =====
function getTeam(id){
  const idx = students.findIndex(s=>s.id===id);
  return idx < Math.ceil(students.length/2) ? 'red' : 'blue';
}
function teamA(){ return students.slice(0, Math.ceil(students.length/2)); }
function teamB(){ return students.slice(Math.ceil(students.length/2)); }
function teamScore(teamFn){
  let sum=0;
  teamFn().forEach(s=>{ sum+=scores[s.id]||0; });
  return sum;
}

// ===== RENDER BATTLEGROUND =====
function renderBattleground(){
  const bg = document.getElementById('battleground');
  const a = teamA(), b = teamB();
  const sa = teamScore(teamA), sb = teamScore(teamB);
  const aWins = sa>sb, bWins = sb>sa;

  const renderPlayer = (s)=>{
    const team = getTeam(s.id);
    const sc = scores[s.id]||0;
    const waterH = Math.min(sc*10, 82);
    let gemsHTML='';
    for(let i=0;i<Math.min(sc,18);i++){
      const left = 4+(i%3)*16+Math.random()*4;
      const bottom = 2+Math.floor(i/3)*12+Math.random()*3;
      gemsHTML += `<div class="gem" style="left:${left}px;bottom:${bottom}px;animation-delay:${(i*0.1).toFixed(1)}s;"></div>`;
    }
    return `
    <div class="stump-group" onclick="addScore(${s.id},event)" data-id="${s.id}">
      <div class="avatar-ring ${team}">${s.emoji}</div>
      <div class="name-tag">${s.name}</div>
      <div class="jar-wrapper">
        <div class="jar-top"></div>
        <div class="jar">
          <div class="water" style="height:${waterH}%;"></div>
          <div class="gems-layer">${gemsHTML}</div>
        </div>
      </div>
      <div class="stump"></div>
      <div class="score-tag">🪙${sc}</div>
    </div>`;
  };

  bg.innerHTML = `
    <div class="team-zone team-a">
      <div class="team-label">
        🅰️ A组
        <span class="crown ${aWins?'show':''}">👑</span>
      </div>
      <div class="team-players">${a.map(renderPlayer).join('')}</div>
      <div class="team-total">🏆 ${sa} 颗金豆</div>
    </div>
    <div class="pk-divider">
      <div class="pk-line"></div>
      <div class="pk-badge">PK</div>
      <div class="pk-line"></div>
    </div>
    <div class="team-zone team-b">
      <div class="team-label">
        🅱️ B组
        <span class="crown ${bWins?'show':''}">👑</span>
      </div>
      <div class="team-players">${b.map(renderPlayer).join('')}</div>
      <div class="team-total">🏆 ${sb} 颗金豆</div>
    </div>`;
}

// ===== HEADER PK =====
function updateHeader(){
  const sa=teamScore(teamA), sb=teamScore(teamB);
  const aW=sa>sb, bW=sb>sa;
  document.getElementById('hdrPK').innerHTML = `
    <span style="color:#ff6b6b">🅰️ ${sa} ${aW?'👑':''}</span>
    <span style="font-size:11px">PK</span>
    <span style="color:#74b9ff">${bW?'👑':''} ${sb} 🅱️</span>`;
}

// ===== RENDER COMPACT =====
function renderCompact(){
  const bar = document.getElementById('compactBar');
  const a=teamA(), b=teamB();
  const sa=teamScore(teamA), sb=teamScore(teamB);
  bar.innerHTML =
    a.map(s=>`<div class="compact-avatar red" onclick="addScore(${s.id},event)" title="${s.name}: ${scores[s.id]||0}豆">${s.emoji}<span class="compact-score">${scores[s.id]||0}</span></div>`).join('') +
    `<span class="compact-sep"></span><span class="compact-pk">PK</span><span class="compact-sep"></span>` +
    b.map(s=>`<div class="compact-avatar blue" onclick="addScore(${s.id},event)" title="${s.name}: ${scores[s.id]||0}豆">${s.emoji}<span class="compact-score">${scores[s.id]||0}</span></div>`).join('') +
    `<span style="margin-left:auto;font-size:10px;color:#ffd700;white-space:nowrap;flex-shrink:0;">🅰️${sa} vs ${sb}🅱️</span>`;
}

function renderAll(){ renderBattleground(); renderCompact(); updateHeader(); }

// ===== SCORING =====
function addScore(id, event){
  scores[id] = (scores[id]||0)+1;
  saveState();

  if(event){
    const gem = document.createElement('div');
    gem.className = 'flying-gem dropping';
    gem.style.left = (event.clientX-10)+'px';
    gem.style.top = (event.clientY-11)+'px';
    document.body.appendChild(gem);

    for(let i=0;i<14;i++){
      const sp = document.createElement('div');
      sp.className = 'sparkle burst';
      sp.style.left = event.clientX+'px';
      sp.style.top = event.clientY+'px';
      sp.style.setProperty('--sx',(Math.random()-0.5)*90+'px');
      sp.style.setProperty('--sy',(Math.random()*55-55)+'px');
      document.body.appendChild(sp);
      setTimeout(()=>sp.remove(),700);
    }
    setTimeout(()=>gem.remove(),600);
  }

  renderAll();

  const student = students.find(s=>s.id===id);
  const sa=teamScore(teamA), sb=teamScore(teamB);
  const winner = sa>sb?'🅰️领先':sb>sa?'🅱️领先':'平局';
  showToast(`${student.emoji} ${student.name} +1 🪙 | ${winner}`);
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}

// ===== COMPACT TOGGLE =====
function toggleCompact(){
  const bar=document.getElementById('compactBar');
  bar.classList.toggle('hidden');
  document.getElementById('btnCompact').textContent = bar.classList.contains('hidden')?'📋 常驻栏':'📋 隐藏栏';
}

// ===== SETTINGS =====
function openSettings(){
  document.getElementById('countSlider').value = students.length;
  window._tempAvatars = {};
  window._tempNames = {};
  students.forEach((s,i)=>{ window._tempAvatars[i]=s.emoji; window._tempNames[i]=s.name; });
  updateCountPreview();
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('show'); }

function updateCountPreview(){
  const n = parseInt(document.getElementById('countSlider').value);
  document.getElementById('countLabel').textContent = n;
  const chips = document.getElementById('studentChips');
  chips.innerHTML = '';
  for(let i=0;i<n;i++){
    const emoji = (window._tempAvatars&&window._tempAvatars[i]) || DEFAULT_ANIMALS[i];
    const name = (window._tempNames&&window._tempNames[i]) || DEFAULT_NAMES[i];
    chips.innerHTML += `
      <div class="student-chip" title="点击换头像">
        <span class="chip-emoji">${emoji}</span>
        <span class="chip-name" contenteditable="true" data-idx="${i}"
              style="cursor:text;outline:none;min-width:28px;"
              onblur="onNameEdit(${i},this.textContent)">${name}</span>
      </div>`;
  }
}

// Chip click → cycle avatar
document.addEventListener('click',function(e){
  const chip = e.target.closest('.student-chip');
  if(!chip)return;
  const emojiEl = chip.querySelector('.chip-emoji');
  const nameEl = chip.querySelector('.chip-name');
  if(!emojiEl||!nameEl)return;
  const idx = parseInt(nameEl.dataset.idx);
  if(isNaN(idx))return;
  const current = window._tempAvatars&&window._tempAvatars[idx] || DEFAULT_ANIMALS[idx];
  const aniIdx = DEFAULT_ANIMALS.indexOf(current);
  const next = DEFAULT_ANIMALS[(aniIdx+1)%DEFAULT_ANIMALS.length];
  if(!window._tempAvatars)window._tempAvatars={};
  window._tempAvatars[idx] = next;
  emojiEl.textContent = next;
});

function onNameEdit(idx,text){
  if(!window._tempNames)window._tempNames={};
  window._tempNames[idx] = text.trim() || DEFAULT_NAMES[idx];
}

function applySettings(){
  const n = parseInt(document.getElementById('countSlider').value);
  const newStudents=[], newScores={};
  for(let i=0;i<n;i++){
    const emoji = (window._tempAvatars&&window._tempAvatars[i]) || DEFAULT_ANIMALS[i];
    const name = (window._tempNames&&window._tempNames[i]) || DEFAULT_NAMES[i];
    const id = students[i]?students[i].id:Date.now()+i;
    newStudents.push({id,emoji,name});
    newScores[id] = scores[id]||0;
  }
  students=newStudents;scores=newScores;
  window._tempAvatars={};window._tempNames={};
  saveState();renderAll();closeSettings();
}

// ===== RESET =====
function resetAll(){
  if(!confirm('确定清零所有分数吗？下节课重新开始！'))return;
  Object.keys(scores).forEach(k=>scores[k]=0);
  saveState();renderAll();
  showToast('🔄 已清零，下节课重新开始！');
}

// ===== FIREFLIES & MAGIC DUST =====
function spawnFireflies(){
  const c=document.getElementById('fireflies');
  for(let i=0;i<15;i++){
    const ff=document.createElement('div');
    ff.className='firefly';
    ff.style.left=(5+Math.random()*90)+'%';
    ff.style.top=(25+Math.random()*55)+'%';
    ff.style.setProperty('--fd',(3+Math.random()*5)+'s');
    ff.style.setProperty('--fdl',(Math.random()*4)+'s');
    ff.style.setProperty('--fx',(Math.random()*40-20)+'px');
    ff.style.setProperty('--fy',(Math.random()*30-25)+'px');
    c.appendChild(ff);
  }
}
function spawnMagicDust(){
  const c=document.getElementById('magicDust');
  for(let i=0;i<25;i++){
    const d=document.createElement('div');
    d.style.cssText=`
      position:fixed;pointer-events:none;z-index:6;
      width:2px;height:2px;background:#ffeaa7;border-radius:50%;
      box-shadow:0 0 3px #ffd700,0 0 6px #ffa500;
      left:${5+Math.random()*90}%;top:${12+Math.random()*72}%;
      --dx:${(Math.random()-0.5)*60}px;--dy:${Math.random()*40-50}px;
      animation:magicDust ${3+Math.random()*5}s ease-in-out infinite;
      animation-delay:${Math.random()*4}s;
    `;
    c.appendChild(d);
  }
}

// ===== INIT =====
loadState();
spawnFireflies();
spawnMagicDust();
renderAll();
document.getElementById('compactBar').classList.remove('hidden');
document.getElementById('btnCompact').textContent = '📋 隐藏栏';

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSettings();});
</script>
</body>
</html>
