<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>金豆PK — 魔法森林</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ===== LANDSCAPE LOCK ===== */
#rotate-prompt{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#1a0a12;color:#ffd700;
  flex-direction:column;align-items:center;justify-content:center;
  font-family:'Segoe UI',system-ui,sans-serif;text-align:center;
}
#rotate-prompt .icon{font-size:64px;animation:rotateHint 2s ease-in-out infinite;}
@keyframes rotateHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
#rotate-prompt p{font-size:18px;margin-top:16px;font-weight:bold;}
@media(orientation:portrait){
  #rotate-prompt{display:flex;}
  .game-container{display:none!important;}
}
@media(orientation:landscape){
  #rotate-prompt{display:none!important;}
}

:root{
  --gold:#ffd700;--gold2:#ffb800;
}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  background:#0d0714;
}

/* ===== 16:9 CONTAINER ===== */
.game-container{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(100vw,177.78vh);height:min(56.25vw,100vh);
  overflow:hidden;
  background:linear-gradient(180deg,
    #0d0714 0%,#1a0d24 8%,#2d1540 18%,
    #5a2d82 30%,#8b4fa8 40%,#c77dff 48%,
    #7c4dff 50%,#448aff 52%,#4fc3f7 55%,
    #81d4fa 60%,#a5d6a7 68%,#66bb6a 75%,
    #388e3c 82%,#1b5e20 90%,#0a2e0a 100%);
}
.game-container::before{
  content:'';position:absolute;inset:0;top:0;height:55%;
  background:radial-gradient(ellipse at 30% 25%,rgba(255,220,150,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 20%,rgba(255,200,100,0.05) 0%,transparent 45%);
  pointer-events:none;z-index:0;
}

/* ===== TREES ===== */
.trees{position:absolute;inset:0;pointer-events:none;z-index:2;}
.tree{
  position:absolute;bottom:0;width:0;height:0;
  border-left:30px solid transparent;border-right:30px solid transparent;
  border-bottom:100px solid #0a1a05;
  filter:brightness(0.5);
  animation:treeSway var(--sw,6s) ease-in-out infinite;
  animation-delay:var(--swd,0s);
  transform-origin:bottom center;
}
.tree.t1{left:2%;bottom:18%;border-bottom-color:#0a1a05;border-bottom-width:130px;border-left-width:35px;border-right-width:35px;--sw:5s;}
.tree.t2{left:10%;bottom:15%;border-bottom-color:#0d2208;border-bottom-width:110px;border-left-width:30px;border-right-width:30px;--sw:7s;--swd:1s;}
.tree.t3{left:18%;bottom:16%;border-bottom-color:#0a1a05;border-bottom-width:150px;border-left-width:40px;border-right-width:40px;--sw:6s;--swd:2s;}
.tree.t4{left:76%;bottom:15%;border-bottom-color:#0d2208;border-bottom-width:140px;border-left-width:38px;border-right-width:38px;--sw:5.5s;--swd:0.5s;}
.tree.t5{left:84%;bottom:13%;border-bottom-color:#0a1a05;border-bottom-width:120px;border-left-width:32px;border-right-width:32px;--sw:7.5s;--swd:1.5s;}
.tree.t6{left:92%;bottom:17%;border-bottom-color:#0d2208;border-bottom-width:145px;border-left-width:36px;border-right-width:36px;--sw:6.2s;--swd:3s;}
.tree::after{
  content:'';position:absolute;left:50%;bottom:-100px;transform:translateX(-50%);
  width:14px;height:45px;background:linear-gradient(90deg,#2a1005,#4a2010,#2a1005);
  border-radius:3px 3px 0 0;
}
.tree.fore{filter:brightness(0.3);z-index:20;}
.tree.fore::after{bottom:-140px;height:60px;width:20px;}
.tree.f1{left:-3%;bottom:10%;border-bottom-color:#061202;border-bottom-width:200px;border-left-width:50px;border-right-width:50px;}
.tree.f2{left:90%;bottom:8%;border-bottom-color:#061202;border-bottom-width:220px;border-left-width:55px;border-right-width:55px;}

/* Clearing */
.clearing{
  position:absolute;bottom:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,
    rgba(60,120,40,0.3) 0%,rgba(40,100,30,0.5) 30%,
    rgba(20,80,20,0.7) 60%,rgba(10,50,15,0.9) 100%);
  z-index:3;pointer-events:none;
  border-radius:50% 60% 0 0/35% 40% 0 0;
}
.dapple{
  position:absolute;top:10%;left:0;right:0;height:55%;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(255,220,140,0.08) 0%,transparent 30%),
    radial-gradient(ellipse at 45% 30%,rgba(255,200,100,0.06) 0%,transparent 25%),
    radial-gradient(ellipse at 75% 45%,rgba(255,220,130,0.05) 0%,transparent 28%);
  pointer-events:none;z-index:4;
  animation:dappleShift 8s ease-in-out infinite;
}

/* ===== BATTLEGROUND ===== */
.battleground{
  position:absolute;bottom:4%;left:2%;right:2%;top:18%;
  display:flex;align-items:flex-end;justify-content:center;
  z-index:5;
}
.team-zone{flex:1;max-width:42%;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
.team-label{
  font-size:clamp(14px,2.2vw,24px);font-weight:900;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.7),0 0 20px rgba(255,215,0,0.3);
  margin-bottom:6px;letter-spacing:0.06em;
  display:flex;align-items:center;gap:6px;transition:transform 0.3s;
}
.team-a .team-label{color:#ff6b8a;}
.team-b .team-label{color:#64b5f6;}
.crown{
  font-size:clamp(20px,3vw,32px);
  animation:crownBounce 0.6s ease-in-out infinite;
  display:none;filter:drop-shadow(0 0 8px rgba(255,215,0,0.6));
}
.crown.show{display:inline-block;}
@keyframes crownBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.2)}}
.team-players{display:flex;gap:clamp(4px,1vw,10px);flex-wrap:wrap;justify-content:center;margin-bottom:4px;}
.team-total{
  font-size:clamp(12px,1.5vw,18px);font-weight:900;color:#ffd700;
  text-shadow:0 0 16px rgba(255,215,0,0.6);
  background:rgba(0,0,0,0.45);padding:3px 14px;border-radius:14px;
  margin-top:2px;backdrop-filter:blur(4px);
  border:1px solid rgba(255,215,0,0.2);
}

/* ===== PK DIVIDER ===== */
.pk-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:clamp(30px,5vw,50px);flex-shrink:0;pointer-events:none;margin-bottom:20px;
}
.pk-line{
  width:3px;flex:1;min-height:40px;
  background:linear-gradient(180deg,
    rgba(255,215,0,0.05) 0%,rgba(255,215,0,0.7) 40%,
    rgba(255,255,200,0.9) 50%,rgba(255,215,0,0.7) 60%,
    rgba(255,215,0,0.05) 100%);
  animation:pkGlow 2s ease-in-out infinite;border-radius:2px;
}
@keyframes pkGlow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.3)}50%{box-shadow:0 0 24px rgba(255,215,0,0.7),0 0 40px rgba(255,180,0,0.3)}}
.pk-badge{
  font-size:clamp(14px,2vw,22px);font-weight:900;color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,0.8),0 0 40px rgba(255,180,0,0.4);
  background:rgba(0,0,0,0.55);padding:5px 12px;border-radius:20px;
  letter-spacing:0.1em;backdrop-filter:blur(4px);
  border:1px solid rgba(255,215,0,0.3);
  animation:pkPulse 1.5s ease-in-out infinite;
}
@keyframes pkPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* ===== STUMP + JAR + AVATAR ===== */
.stump-group{
  display:flex;flex-direction:column;align-items:center;
  pointer-events:auto;cursor:pointer;
  transition:transform 0.2s;position:relative;
}
.stump-group:active{transform:scale(0.94);}
.stump-group:hover .avatar-ring{transform:scale(1.08);}
.stump{
  width:clamp(50px,7vw,72px);height:clamp(18px,2.2vw,26px);
  background:linear-gradient(180deg,#b8864e 0%,#7a4220 100%);
  border-radius:40px/14px;
  box-shadow:0 3px 12px rgba(0,0,0,0.4),inset 0 2px 4px rgba(255,255,255,0.08);
  position:relative;z-index:6;
}
.stump::before{
  content:'';position:absolute;top:3px;left:8px;right:8px;height:6px;
  background:radial-gradient(ellipse,#d4a870 0%,transparent 70%);border-radius:50%;
}
.stump::after{
  content:'';position:absolute;bottom:-3px;left:12%;right:12%;height:5px;
  background:radial-gradient(ellipse at center,rgba(100,180,60,0.5),transparent);border-radius:50%;
}

.jar-wrapper{position:relative;margin-bottom:-5px;z-index:7;}
.jar{
  width:clamp(50px,7vw,66px);height:clamp(70px,9.5vw,90px);
  background:linear-gradient(180deg,
    rgba(255,255,255,0.2) 0%,rgba(180,200,230,0.1) 25%,
    rgba(150,180,210,0.06) 50%,rgba(120,160,190,0.15) 100%);
  border:2px solid rgba(200,220,240,0.4);
  border-radius:18px 18px 26px 26px;
  position:relative;overflow:hidden;
  box-shadow:
    inset 0 0 35px rgba(200,220,255,0.1),
    0 8px 25px rgba(0,0,0,0.3),
    0 0 18px rgba(255,200,50,0.08);
  animation:jarGlow 4s ease-in-out infinite;
}
.jar::before{
  content:'';position:absolute;top:5px;left:6px;right:50%;height:2px;
  background:rgba(255,255,255,0.3);border-radius:2px;z-index:5;
}
.jar::after{
  content:'';position:absolute;top:10px;left:5px;width:6px;height:35px;
  background:linear-gradient(180deg,rgba(255,255,255,0.25),transparent);
  border-radius:3px;z-index:5;
}
.jar-top{
  position:absolute;top:-7px;left:8px;right:8px;height:12px;
  background:linear-gradient(180deg,rgba(220,200,160,0.5),rgba(170,150,110,0.3));
  border-radius:8px 8px 3px 3px;
  border:2px solid rgba(180,150,120,0.45);border-bottom:none;z-index:2;
}
.water{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,
    rgba(255,220,50,0.3) 0%,rgba(255,200,40,0.4) 40%,
    rgba(240,170,20,0.55) 70%,rgba(200,130,10,0.65) 100%);
  transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);
  border-radius:0 0 24px 24px;z-index:1;
  animation:waterShimmer 3s ease-in-out infinite;
}
.water::after{
  content:'';position:absolute;top:2px;left:10%;right:10%;height:2px;
  background:rgba(255,255,200,0.5);border-radius:2px;
  animation:waterShimmer 2s ease-in-out infinite 0.5s;
}
.gems-layer{position:absolute;bottom:0;left:0;right:0;z-index:3;pointer-events:none;}
.gem{
  position:absolute;width:clamp(9px,1.2vw,13px);height:clamp(10px,1.4vw,15px);
  background:linear-gradient(135deg,#fff8c0 0%,#ffd700 30%,#e6a800 65%,#b8860b 100%);
  clip-path:polygon(50% 0%,85% 30%,100% 65%,70% 100%,30% 100%,0% 65%,15% 30%);
  box-shadow:0 0 6px rgba(255,215,0,0.6),inset 0 1px 2px rgba(255,255,255,0.5);
  animation:gemShimmer 2s ease-in-out infinite;
}
@keyframes gemShimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4) saturate(1.3)}}

/* ===== AVATAR WITH REAL PHOTO ===== */
.avatar-ring{
  width:clamp(42px,5.5vw,56px);height:clamp(42px,5.5vw,56px);
  border-radius:50%;
  background-color:#5a3a1a;
  background-size:cover;
  background-position:center;
  border:3px solid #d4a060;
  box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 20px rgba(200,150,50,0.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  margin-bottom:3px;
  transition:transform 0.2s,box-shadow 0.2s;
  position:relative;
}
.avatar-ring.red{border-color:#ff6b8a;box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 22px rgba(255,100,130,0.3);}
.avatar-ring.blue{border-color:#64b5f6;box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 22px rgba(100,180,246,0.3);}
.avatar-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.avatar-ring svg{width:85%;height:85%;}

.name-tag{
  font-size:clamp(8px,1vw,11px);font-weight:bold;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.6);
  margin-bottom:2px;pointer-events:none;max-width:55px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;text-align:center;letter-spacing:0.03em;
}
.score-tag{
  font-size:clamp(9px,1.1vw,12px);font-weight:bold;color:#ffd700;
  text-shadow:0 1px 6px rgba(0,0,0,0.7),0 0 8px rgba(255,215,0,0.4);
  margin-top:3px;pointer-events:none;
}

/* Subtract button */
.sub-btn{
  position:absolute;top:-4px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:rgba(200,50,50,0.8);color:#fff;
  border:2px solid rgba(255,255,255,0.4);
  font-size:12px;line-height:16px;text-align:center;
  cursor:pointer;z-index:10;display:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
}
.stump-group:hover .sub-btn,.stump-group.longpress .sub-btn{display:block;}
.sub-btn:active{background:#ff0000;}

/* ===== FLYING GEM & EFFECTS ===== */
.flying-gem{
  position:absolute;pointer-events:none;z-index:50;
  width:22px;height:25px;
  background:linear-gradient(135deg,#fff8c0 0%,#ffd700 25%,#e6a800 60%,#b8860b 100%);
  clip-path:polygon(50% 0%,85% 30%,100% 65%,70% 100%,30% 100%,0% 65%,15% 30%);
  box-shadow:0 0 16px rgba(255,215,0,0.8),0 0 30px rgba(255,200,0,0.4);
}
.flying-gem.dropping{animation:gemDrop 0.5s cubic-bezier(0.22,0.61,0.36,1) forwards;}
@keyframes gemDrop{
  0%{transform:translateY(-50px) scale(1.4) rotate(0deg);opacity:1}
  30%{transform:translateY(-10px) scale(1.1) rotate(20deg);opacity:1}
  70%{transform:translateY(5px) scale(0.9) rotate(-10deg);opacity:0.9}
  100%{transform:translateY(0) scale(0.6) rotate(0deg);opacity:0}
}
.sparkle{
  position:absolute;pointer-events:none;z-index:51;
  width:6px;height:6px;background:#ffd700;border-radius:50%;
  box-shadow:0 0 8px #ffd700,0 0 16px #ffa500;
}
.sparkle.burst{animation:sparkleBurst 0.7s ease-out forwards;}
@keyframes sparkleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--sx),var(--sy)) scale(0);opacity:0}
}
.score-pop{
  position:absolute;pointer-events:none;z-index:52;
  font-size:clamp(16px,2.5vw,26px);font-weight:900;
  color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.8);
  animation:popUp 0.8s ease-out forwards;
}
@keyframes popUp{
  0%{transform:translateY(0) scale(0.5);opacity:1}
  50%{transform:translateY(-30px) scale(1.2);opacity:1}
  100%{transform:translateY(-60px) scale(0.8);opacity:0}
}
.confetti{
  position:absolute;pointer-events:none;z-index:55;
  width:8px;height:8px;border-radius:2px;
  animation:confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0}
}

/* ===== HEADER ===== */
.header{
  position:absolute;top:0;left:0;right:0;height:44px;
  background:linear-gradient(180deg,rgba(10,5,20,0.95),rgba(20,10,30,0.8));
  z-index:100;display:flex;align-items:center;padding:0 10px;
  gap:6px;backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(180,140,80,0.25);
}
.header .title{font-size:13px;font-weight:bold;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.5);white-space:nowrap;}
.header .btn{
  padding:4px 10px;border-radius:12px;border:1px solid rgba(255,215,0,0.35);
  background:rgba(40,20,10,0.5);color:#ffd700;
  font-size:10px;font-weight:bold;cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:inherit;
}
.header .btn:hover{background:rgba(255,215,0,0.15);border-color:#ffd700;}
.header .btn.danger{border-color:rgba(255,100,100,0.5);color:#ffb3b3;}
.header .btn.danger:hover{background:rgba(255,100,100,0.15);}
.header .hdr-pk{font-size:12px;font-weight:bold;margin-left:auto;display:flex;gap:8px;align-items:center;color:#ffd700;}

/* ===== SETTINGS ===== */
.settings-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:200;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);
}
.settings-overlay.show{display:flex;}
.settings-panel{
  background:linear-gradient(180deg,#2a1040,#150525);
  border:2px solid rgba(200,150,80,0.4);border-radius:20px;padding:20px;
  width:85%;max-width:500px;max-height:80%;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);color:#e0c080;
}
.settings-panel h3{text-align:center;font-size:1.1em;margin-bottom:12px;color:#ffd700;}
.settings-panel label{display:block;font-size:11px;margin-bottom:3px;color:#d0b070;}
.settings-panel input[type=range]{width:100%;margin-bottom:10px;accent-color:#ffd700;}
.settings-panel .btn-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.settings-panel button{
  padding:6px 16px;border-radius:12px;
  border:1px solid rgba(255,215,0,0.35);
  background:rgba(80,40,20,0.5);color:#ffd700;
  font-size:11px;cursor:pointer;font-weight:bold;font-family:inherit;
}
.settings-panel button:hover{background:rgba(255,215,0,0.15);}
.settings-panel .student-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.settings-panel .student-chip{
  display:flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:10px;background:rgba(80,40,20,0.4);
  font-size:10px;border:1px solid rgba(200,150,80,0.3);cursor:pointer;
}
.settings-panel .student-chip img{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.settings-panel .student-chip svg{width:24px;height:24px;}

/* ===== COMPACT BAR ===== */
.compact-bar{
  position:absolute;top:44px;left:0;right:0;height:44px;
  background:linear-gradient(180deg,rgba(20,10,30,0.92),rgba(30,15,35,0.85));
  z-index:99;display:flex;align-items:center;padding:0 8px;
  gap:4px;overflow-x:auto;backdrop-filter:blur(6px);
  border-bottom:1px solid rgba(180,140,80,0.2);
  transition:transform 0.3s;
}
.compact-bar.hidden{transform:translateY(-110%);pointer-events:none;}
.compact-bar .compact-sep{width:1px;height:24px;background:rgba(255,215,0,0.25);flex-shrink:0;}
.compact-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  cursor:pointer;border:2px solid #d4a060;overflow:hidden;
  background-size:cover;background-position:center;
  transition:transform 0.15s;position:relative;
}
.compact-avatar:active{transform:scale(0.88);}
.compact-avatar.red{border-color:#ff6b8a;}
.compact-avatar.blue{border-color:#64b5f6;}
.compact-avatar svg{width:75%;height:75%;}
.compact-score{font-size:9px;font-weight:bold;color:#ffd700;text-shadow:0 1px 3px rgba(0,0,0,0.6);flex-shrink:0;margin-left:1px;}
.compact-pk{font-size:10px;font-weight:900;color:#ffd700;margin:0 3px;flex-shrink:0;}

/* ===== TOAST ===== */
.toast{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);color:#ffd700;padding:5px 14px;
  border-radius:10px;font-size:11px;font-weight:bold;z-index:300;
  pointer-events:none;opacity:0;transition:opacity 0.3s;
  border:1px solid rgba(255,215,0,0.25);
}
.toast.show{opacity:1;}

/* Fireflies */
.firefly{
  position:absolute;pointer-events:none;z-index:4;
  width:4px;height:4px;background:#ffeaa7;border-radius:50%;
  box-shadow:0 0 8px #ffeaa7,0 0 16px #ffd700,0 0 24px #ffa500;
  animation:fireflyFloat var(--fd) ease-in-out infinite;
  animation-delay:var(--fdl);opacity:0;
}
@keyframes fireflyFloat{
  0%,100%{opacity:0;transform:translate(0,0)}
  20%{opacity:0.9}50%{opacity:0.5;transform:translate(var(--fx),var(--fy))}80%{opacity:0.8}
}

// getKidPhoto(index 0-11): returns {url, bgSize, bgPos}
// kids 0-7 from the 8-kid sprite (2 rows x 4 cols, 640x640)
// kids 8-11 from the 4-kid sprite (1 row x 4 cols, 640x240)
function getKidPhoto(idx) {
  if (idx < 8) {
    const row = Math.floor(idx / 4); // 0 or 1
    const col = idx % 4;              // 0..3
    const cellW = 640 / 4;            // 160
    const cellH = 640 / 2;            // 320
    const x = col * cellW;
    const y = row * cellH;
    return {
      url: KIDS8_WEBP,
      bgSize: `${640/42*100}% ${640/42*100}%`,  // scale relative to avatar-ring size
      bgPos: `${x/640*100}% ${y/640*100}%`
    };
  } else {
    const col = (idx - 8) % 4;  // 0..3
    const cellW = 640 / 4;      // 160
    const x = col * cellW;
    return {
      url: KIDS4_WEBP,
      bgSize: `${640/42*100}% ${240/42*100}%`,
      bgPos: `${x/640*100}% 0%`
    };
  }
}

  koala: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="30" fill="#9e9e9e"/><circle cx="38" cy="48" r="12" fill="#e0e0e0"/><circle cx="62" cy="48" r="12" fill="#e0e0e0"/><circle cx="38" cy="42" r="5" fill="#222"/><circle cx="62" cy="42" r="5" fill="#222"/><circle cx="39" cy="41" r="2" fill="#fff"/><circle cx="63" cy="41" r="2" fill="#fff"/><ellipse cx="50" cy="60" rx="10" ry="8" fill="#bdbdbd"/></svg>`,
  frog: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="30" fill="#66bb6a"/><circle cx="40" cy="36" r="10" fill="#fff"/><circle cx="60" cy="36" r="10" fill="#fff"/><circle cx="42" cy="36" r="5" fill="#222"/><circle cx="62" cy="36" r="5" fill="#222"/><circle cx="43" cy="35" r="2" fill="#fff"/><circle cx="63" cy="35" r="2" fill="#fff"/><path d="M30 60 Q50 70 70 60" stroke="#4caf50" stroke-width="2" fill="none"/></svg>`,
  fox: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" fill="#ff7043"/><path d="M50 8 L32 0 L25 20 L38 40Z" fill="#ff7043"/><path d="M50 8 L68 0 L75 20 L62 40Z" fill="#ff7043"/><path d="M32 0 L28 10 L38 40" fill="#fff"/><path d="M68 0 L72 10 L62 40" fill="#fff"/><circle cx="40" cy="46" r="5" fill="#fff"/><circle cx="60" cy="46" r="5" fill="#fff"/><circle cx="41" cy="47" r="3" fill="#222"/><circle cx="61" cy="47" r="3" fill="#222"/><circle cx="50" cy="62" r="5" fill="#e65100"/><ellipse cx="50" cy="72" rx="12" ry="8" fill="#fff"/></svg>`,
  tiger: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="30" fill="#ff9800"/><circle cx="50" cy="42" rx="28" ry="18" fill="#fff"/><path d="M28 30 L20 16 L32 32" fill="#ff9800"/><path d="M72 30 L80 16 L68 32" fill="#ff9800"/><circle cx="38" cy="44" r="5" fill="#222"/><circle cx="62" cy="44" r="5" fill="#222"/><ellipse cx="50" cy="70" rx="14" ry="10" fill="#fff"/><path d="M36 40 L32 48 M64 40 L68 48" stroke="#3d1f00" stroke-width="2"/></svg>`,
  monkey: `<svg viewBox="0 0 100 100"><circle cx="50" cy="58" r="26" fill="#8d6e63"/><circle cx="42" cy="48" r="12" fill="#d7ccc8"/><circle cx="58" cy="48" r="12" fill="#d7ccc8"/><circle cx="40" cy="48" r="5" fill="#222"/><circle cx="60" cy="48" r="5" fill="#222"/><ellipse cx="50" cy="66" rx="6" ry="5" fill="#5d4037"/><ellipse cx="42" cy="28" rx="10" ry="8" fill="#8d6e63"/><ellipse cx="58" cy="28" rx="10" ry="8" fill="#8d6e63"/></svg>`,
  bear: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="30" fill="#795548"/><circle cx="44" cy="38" r="12" fill="#a1887f"/><circle cx="56" cy="38" r="12" fill="#a1887f"/><circle cx="44" cy="38" r="6" fill="#4e342e"/><circle cx="56" cy="38" r="6" fill="#4e342e"/><circle cx="35" cy="44" r="3" fill="#222"/><circle cx="50" cy="44" r="3" fill="#222"/><circle cx="65" cy="44" r="3" fill="#222"/><ellipse cx="50" cy="62" rx="10" ry="8" fill="#8d6e63"/></svg>`,
  cow: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" fill="#fff"/><circle cx="38" cy="46" r="7" fill="#222"/><circle cx="62" cy="46" r="7" fill="#222"/><ellipse cx="50" cy="70" rx="12" ry="8" fill="#ffcccc"/><ellipse cx="30" cy="32" rx="6" ry="12" fill="#333"/><ellipse cx="70" cy="32" rx="6" ry="12" fill="#333"/></svg>`,
  lion: `<svg viewBox="0 0 100 100"><circle cx="50" cy="55" r="22" fill="#f9a825"/><circle cx="50" cy="55" r="30" fill="none" stroke="#f57f17" stroke-width="4" stroke-dasharray="8 6"/><circle cx="50" cy="55" r="36" fill="none" stroke="#ffb300" stroke-width="3" stroke-dasharray="6 8"/><circle cx="40" cy="48" r="5" fill="#e65100"/><circle cx="60" cy="48" r="5" fill="#e65100"/><circle cx="50" cy="58" r="4" fill="#b26500"/><ellipse cx="50" cy="66" rx="8" ry="6" fill="#fff8e1"/></svg>`
};

const ANIMAL_KEYS = ['dog','cat','rabbit','panda','koala','frog','fox','tiger','monkey','bear','cow','lion'];
const DEFAULT_NAMES = ['小美','小乐','小宇','小希','小辰','小雨','小安','小艺','小阳','小萌','小晨','小瑶'];

let students=[],scores={},longPressTimer=null,longPressId=null;

// ===== AUDIO =====
let audioCtx=null;
function initAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
function playCoinSound(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sine';
  o.frequency.setValueAtTime(880,t);
  o.frequency.exponentialRampToValueAtTime(1320,t+0.08);
  o.frequency.setValueAtTime(1100,t+0.1);
  o.frequency.exponentialRampToValueAtTime(660,t+0.2);
  g.gain.setValueAtTime(0.25,t);
  g.gain.exponentialRampToValueAtTime(0.01,t+0.25);
  o.start(t);o.stop(t+0.25);
}
function playMinusSound(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='triangle';
  o.frequency.setValueAtTime(440,t);
  o.frequency.exponentialRampToValueAtTime(220,t+0.2);
  g.gain.setValueAtTime(0.15,t);
  g.gain.exponentialRampToValueAtTime(0.01,t+0.25);
  o.start(t);o.stop(t+0.25);
}
function playWinSound(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='sine';
    o.frequency.value=f;
    g.gain.setValueAtTime(0.12,t+i*0.12);
    g.gain.exponentialRampToValueAtTime(0.01,t+i*0.12+0.2);
    o.start(t+i*0.12);o.stop(t+i*0.12+0.2);
  });
}

// ===== STATE =====
function loadState(){
  try{
    const raw=localStorage.getItem('goldpk_v3');
    if(raw){const s=JSON.parse(raw);students=s.students||[];scores=s.scores||{};}
  }catch(e){}
  if(!students.length){
    students=[0,1,2,3,4,5,6,7].map(i=>({id:i,key:ANIMAL_KEYS[i],name:DEFAULT_NAMES[i]}));
    students.forEach(s=>{if(!(s.id in scores))scores[s.id]=0;});
  }
}
function saveState(){
  try{localStorage.setItem('goldpk_v3',JSON.stringify({students,scores}));}catch(e){}
}

// ===== TEAM LOGIC =====
function getTeam(id){
  const idx=students.findIndex(s=>s.id===id);
  return idx<Math.ceil(students.length/2)?'red':'blue';
}
function teamA(){return students.slice(0,Math.ceil(students.length/2));}
function teamB(){return students.slice(Math.ceil(students.length/2));}
function teamScore(fn){let sum=0;fn().forEach(s=>{sum+=scores[s.id]||0;});return sum;}

// ===== AVATAR HTML =====
function avatarHTML(student, size) {
  const w = size || 56;
  const idx = students.indexOf(student);
  if (idx >= 0 && idx < 12) {
    const photo = getKidPhoto(idx);
    return `<div style="width:100%;height:100%;border-radius:50%;background-image:url(${photo.url});background-size:${(640/42*100).toFixed(0)}% ${(idx<8?640:240)/42*100}%;background-position:${photo.bgPos};"></div>`;
  }
  return getAvatarSVG(student.key||ANIMAL_KEYS[0]);
}
function avatarStyleInline(student) {
  const idx = students.indexOf(student);
  if (idx >= 0 && idx < 12) {
    const photo = getKidPhoto(idx);
    const sX = idx < 8 ? 640/42*100 : 640/42*100;
    const sY = idx < 8 ? 640/42*100 : 240/42*100;
    return `background-image:url(${photo.url});background-size:${sX.toFixed(0)}% ${sY.toFixed(0)}%;background-position:${photo.bgPos};`;
  }
  return '';
}
function getAvatarSVG(key){return SVG_AVATARS[key]||SVG_AVATARS.dog;}

// ===== RENDER =====
let prevAWins=false,prevBWins=false;
function renderBattleground(){
  const bg=document.getElementById('battleground');
  const a=teamA(),b=teamB();
  const sa=teamScore(teamA),sb=teamScore(teamB);
  const aWins=sa>sb,bWins=sb>sa;

  if((aWins&&!prevAWins)||(bWins&&!prevBWins)){initAudio();playWinSound();}
  prevAWins=aWins;prevBWins=bWins;

  const renderPlayer=s=>{
    const team=getTeam(s.id);
    const sc=scores[s.id]||0;
    const waterH=Math.min(sc*10,82);
    let gemsHTML='';
    for(let i=0;i<Math.min(sc,18);i++){
      const left=4+(i%3)*16+Math.random()*4;
      const bottom=2+Math.floor(i/3)*12+Math.random()*3;
      gemsHTML+=`<div class="gem" style="left:${left}px;bottom:${bottom}px;animation-delay:${(i*0.1).toFixed(1)}s;"></div>`;
    }
    const idx = students.indexOf(s);
    const avatarInner = idx>=0&&idx<12
      ? `<div style="width:100%;height:100%;border-radius:50%;${avatarStyleInline(s)}"></div>`
      : getAvatarSVG(s.key||ANIMAL_KEYS[0]);
    return `<div class="stump-group" onpointerdown="onPointerDown(${s.id},event)" onpointerup="onPointerUp(${s.id},event)" onpointerleave="onPointerUp(${s.id},event)" data-id="${s.id}">
      <div class="sub-btn" onclick="event.stopPropagation();subtractScore(${s.id},event)">−</div>
      <div class="avatar-ring ${team}">${avatarInner}</div>
      <div class="name-tag">${s.name}</div>
      <div class="jar-wrapper">
        <div class="jar-top"></div><div class="jar"><div class="water" style="height:${waterH}%;"></div><div class="gems-layer">${gemsHTML}</div></div>
      </div>
      <div class="stump"></div>
      <div class="score-tag">🪙${sc}</div>
    </div>`;
  };

  bg.innerHTML=`
    <div class="team-zone team-a">
      <div class="team-label">🅰️ A组<span class="crown ${aWins?'show':''}">👑</span></div>
      <div class="team-players">${a.map(renderPlayer).join('')}</div>
      <div class="team-total">🏆 ${sa} 颗金豆</div>
    </div>
    <div class="pk-divider">
      <div class="pk-line"></div><div class="pk-badge">PK</div><div class="pk-line"></div>
    </div>
    <div class="team-zone team-b">
      <div class="team-label"><span class="crown ${bWins?'show':''}">👑</span>B组 🅱️</div>
      <div class="team-players">${b.map(renderPlayer).join('')}</div>
      <div class="team-total">🏆 ${sb} 颗金豆</div>
    </div>`;
}

function updateHeader(){
  const sa=teamScore(teamA),sb=teamScore(teamB);
  const aW=sa>sb,bW=sb>sa;
  document.getElementById('hdrPK').innerHTML=`
    <span style="color:#ff6b8a">🅰️ ${sa} ${aW?'👑':''}</span>
    <span style="font-size:10px">PK</span>
    <span style="color:#64b5f6">${bW?'👑':''} ${sb} 🅱️</span>`;
}

function renderCompact(){
  const bar=document.getElementById('compactBar');
  const a=teamA(),b=teamB();
  const sa=teamScore(teamA),sb=teamScore(teamB);
  const renderCAvatar=s=>{
    const idx=students.indexOf(s);
    const sty=idx>=0&&idx<12?avatarStyleInline(s):'';
    const inner=idx>=0&&idx<12?'':getAvatarSVG(s.key||ANIMAL_KEYS[0]);
    return `<div class="compact-avatar ${getTeam(s.id)}" style="${sty}" onpointerdown="onPointerDown(${s.id},event)" onpointerup="onPointerUp(${s.id},event)" onpointerleave="onPointerUp(${s.id},event)" title="${s.name}: ${scores[s.id]||0}豆">${inner}<span class="compact-score">${scores[s.id]||0}</span></div>`;
  };
  bar.innerHTML=
    a.map(renderCAvatar).join('')+
    `<span class="compact-sep"></span><span class="compact-pk">PK</span><span class="compact-sep"></span>`+
    b.map(renderCAvatar).join('')+
    `<span style="margin-left:auto;font-size:9px;color:#ffd700;white-space:nowrap;flex-shrink:0;">🅰️${sa} vs ${sb}🅱️</span>`;
}

function renderAll(){renderBattleground();renderCompact();updateHeader();}

// ===== SCORING =====
function addScore(id,event){
  initAudio();
  scores[id]=(scores[id]||0)+1;
  saveState();
  playCoinSound();

  const container=document.getElementById('gameContainer');
  if(event){
    const cRect=container.getBoundingClientRect();
    const cx=event.clientX-cRect.left,cy=event.clientY-cRect.top;

    const gem=document.createElement('div');
    gem.className='flying-gem dropping';
    gem.style.left=cx+'px';gem.style.top=cy+'px';
    container.appendChild(gem);

    for(let i=0;i<16;i++){
      const sp=document.createElement('div');
      sp.className='sparkle burst';
      sp.style.left=cx+'px';sp.style.top=cy+'px';
      sp.style.setProperty('--sx',(Math.random()-0.5)*100+'px');
      sp.style.setProperty('--sy',(Math.random()*60-60)+'px');
      container.appendChild(sp);
      setTimeout(()=>sp.remove(),700);
    }

    const pop=document.createElement('div');
    pop.className='score-pop';
    pop.style.left=(cx-15)+'px';pop.style.top=(cy-10)+'px';
    pop.textContent='+1';
    container.appendChild(pop);
    setTimeout(()=>pop.remove(),800);

    const colors=['#ffd700','#ff6b6b','#74b9ff','#55efc4','#fdcb6e','#e056a0','#7bed9f'];
    for(let i=0;i<10;i++){
      const cf=document.createElement('div');
      cf.className='confetti';
      cf.style.left=cx+'px';cf.style.top=cy+'px';
      cf.style.background=colors[Math.floor(Math.random()*colors.length)];
      cf.style.setProperty('--cx',(Math.random()-0.5)*120+'px');
      cf.style.setProperty('--cy',Math.random()*80+40+'px');
      cf.style.setProperty('--cr',Math.random()*720+'deg');
      container.appendChild(cf);
      setTimeout(()=>cf.remove(),1500);
    }
    setTimeout(()=>gem.remove(),550);
  }

  renderAll();
  const student=students.find(s=>s.id===id);
  const sa=teamScore(teamA),sb=teamScore(teamB);
  const winner=sa>sb?'🅰️领先':sb>sa?'🅱️领先':'平局';
  showToast(`${student.name} +1 🪙 | ${winner}`);
}

function subtractScore(id,event){
  initAudio();
  const current=scores[id]||0;
  if(current<=0) return;
  scores[id]=current-1;
  saveState();
  playMinusSound();
  renderAll();
  const student=students.find(s=>s.id===id);
  showToast(`${student.name} −1 🪙`);
}

function onPointerDown(id,event){
  longPressId=id;
  longPressTimer=setTimeout(()=>{
    const el=document.querySelector(`.stump-group[data-id="${id}"]`);
    if(el)el.classList.add('longpress');
    subtractScore(id,event);
    longPressTimer=null;
  },600);
}
function onPointerUp(id,event){
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer=null;
    addScore(id,event);
  }
  document.querySelectorAll('.longpress').forEach(el=>el.classList.remove('longpress'));
}

// ===== TOAST =====
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}

// ===== COMPACT TOGGLE =====
function toggleCompact(){
  const bar=document.getElementById('compactBar');
  bar.classList.toggle('hidden');
  document.getElementById('btnCompact').textContent=bar.classList.contains('hidden')?'📋 常驻栏':'📋 隐藏栏';
}

// ===== SETTINGS =====
function openSettings(){
  initAudio();
  document.getElementById('countSlider').value=students.length;
  window._tempKeys={};window._tempNames={};
  students.forEach((s,i)=>{window._tempKeys[i]=s.key||ANIMAL_KEYS[i];window._tempNames[i]=s.name;});
  updateCountPreview();
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('show');}

function updateCountPreview(){
  const n=parseInt(document.getElementById('countSlider').value);
  document.getElementById('countLabel').textContent=n;
  const chips=document.getElementById('studentChips');
  chips.innerHTML='';
  for(let i=0;i<n;i++){
    const key=(window._tempKeys&&window._tempKeys[i])||ANIMAL_KEYS[i];
    const name=(window._tempNames&&window._tempNames[i])||DEFAULT_NAMES[i];
    const photoInner = i<12
      ? `<div style="width:24px;height:24px;border-radius:50%;${(()=>{const p=getKidPhoto(i);return `background-image:url(${p.url});background-size:${i<8?'1524':'1524'}% ${i<8?'1524':'571'}%;background-position:${p.bgPos};`})()};"></div>`
      : getAvatarSVG(key);
    chips.innerHTML+=`
      <div class="student-chip" title="点击换头像">
        ${photoInner}
        <span class="chip-name" contenteditable="true" data-idx="${i}"
              style="cursor:text;outline:none;min-width:28px;"
              onblur="onNameEdit(${i},this.textContent)">${name}</span>
      </div>`;
  }
}

document.addEventListener('click',function(e){
  const chip=e.target.closest('.student-chip');
  if(!chip)return;
  const svgEl=chip.querySelector('svg');
  const nameEl=chip.querySelector('.chip-name');
  if(!nameEl)return;
  const idx=parseInt(nameEl.dataset.idx);
  if(isNaN(idx))return;
  // Only cycle if showing SVG (fallback, idx>=12), otherwise photos are fixed per position
  if(idx>=12 && svgEl){
    const current=window._tempKeys&&window._tempKeys[idx]||ANIMAL_KEYS[idx];
    const curIdx=ANIMAL_KEYS.indexOf(current);
    const next=ANIMAL_KEYS[(curIdx+1)%ANIMAL_KEYS.length];
    if(!window._tempKeys)window._tempKeys={};
    window._tempKeys[idx]=next;
    svgEl.innerHTML=getAvatarSVG(next);
  }
});

function onNameEdit(idx,text){
  if(!window._tempNames)window._tempNames={};
  window._tempNames[idx]=text.trim()||DEFAULT_NAMES[idx];
}

function applySettings(){
  const n=parseInt(document.getElementById('countSlider').value);
  const newStudents=[],newScores={};
  for(let i=0;i<n;i++){
    const key=(window._tempKeys&&window._tempKeys[i])||ANIMAL_KEYS[i];
    const name=(window._tempNames&&window._tempNames[i])||DEFAULT_NAMES[i];
    const id=students[i]?students[i].id:Date.now()+i;
    newStudents.push({id,key,name});
    newScores[id]=scores[id]||0;
  }
  students=newStudents;scores=newScores;
  window._tempKeys={};window._tempNames={};
  saveState();renderAll();closeSettings();
}

// ===== RESET =====
function resetAll(){
  if(!confirm('确定清零所有分数吗？下节课重新开始！'))return;
  Object.keys(scores).forEach(k=>scores[k]=0);
  saveState();renderAll();
  showToast('🔄 已清零，下节课重新开始！');
}

// ===== FIREFLIES =====
function spawnFireflies(){
  const c=document.getElementById('fireflies');
  for(let i=0;i<20;i++){
    const ff=document.createElement('div');
    ff.className='firefly';
    ff.style.left=(3+Math.random()*94)+'%';
    ff.style.top=(20+Math.random()*60)+'%';
    ff.style.setProperty('--fd',(3+Math.random()*6)+'s');
    ff.style.setProperty('--fdl',(Math.random()*5)+'s');
    ff.style.setProperty('--fx',(Math.random()*50-25)+'px');
    ff.style.setProperty('--fy',(Math.random()*35-30)+'px');
    c.appendChild(ff);
  }
}

// ===== INIT =====
loadState();
spawnFireflies();
renderAll();
document.getElementById('compactBar').classList.remove('hidden');
document.getElementById('btnCompact').textContent='📋 隐藏栏';
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSettings();});
document.addEventListener('pointerdown',initAudio,{once:true});
</script>
